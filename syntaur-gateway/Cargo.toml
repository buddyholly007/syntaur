[package]
name = "syntaur-gateway"
version = "0.1.0"
edition.workspace = true

[dependencies]
mcp-protocol = { path = "../mcp-protocol" }
syntaur-sdk = { path = "../syntaur-sdk" }
snow = "0.10"

chrono-tz = "0.10"
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
async-trait = { workspace = true }
futures-util = { workspace = true }

axum = { version = "0.8", features = ["macros", "multipart", "ws"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls"] }
regex = "1"
rusqlite = { version = "0.32", features = ["bundled"] }
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
lru = "0.12"
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
base64 = "0.22"
libc = "0.2"
rand = "0.8"
mdns-sd = "0.13"
sha2 = "0.10"
async-stream = "0.3"
maud = "0.26"
serde_yaml = "0.9"

# Phase 0 voice skill router: pure-Rust ONNX embeddings for find_tool dispatch.
# BGE-small-en-v1.5 (~30MB) is downloaded into the cache dir on first init.
# Uses CPU; 384-dim embeddings; ~50ms per query on a desktop Intel.
fastembed = "4"

shell-words = "1"
subtle = "2"
tower-http = { version = "0.6", features = ["limit", "cors"] }

ed25519-dalek = "2"
hex = "0.4"
rustls-pemfile = "2"
rustls = { version = "0.23", features = ["ring"] }
webpki-roots = "1"
