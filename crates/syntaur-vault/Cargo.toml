[package]
name = "syntaur-vault"
version = "0.1.0"
edition.workspace = true
description = "Encrypted secret storage for Sean's personal tokens + API keys. Per-host agent caches the derived key in-process; vault file is NFS-shared between hosts."

[lib]
name = "syntaur_vault_core"
path = "src/lib.rs"

[[bin]]
name = "syntaur-vault"
path = "src/bin/syntaur_vault.rs"

[dependencies]
argon2 = "0.5"
chacha20poly1305 = "0.10"
rand = "0.8"
serde = { workspace = true }
serde_json = { workspace = true }
clap = { version = "4", features = ["derive"] }
rpassword = "7"
chrono = { version = "0.4", features = ["serde"] }
anyhow = { workspace = true }
thiserror = { workspace = true }
zeroize = { version = "1", features = ["zeroize_derive"] }
# The agent uses blocking std::os::unix::net — no tokio needed. Small
# single-threaded daemon; simpler + fewer deps.
nix = { version = "0.29", features = ["process"] }
# Daemonizer: double-fork, setsid, detach from tty. Called by
# `syntaur-vault agent --internal-daemon` after the parent CLI exec's
# itself as a child. Plain crate, no transitive bloat.
daemonize = "0.5"
