[package]
name = "syntaur-vault"
version = "0.1.0"
edition.workspace = true
description = "Encrypted secret storage for Sean's personal tokens + API keys. Per-host agent caches the derived key in-process; vault file is NFS-shared between hosts."

[lib]
name = "syntaur_vault_core"
path = "src/lib.rs"

[[bin]]
name = "syntaur-vault"
path = "src/bin/syntaur_vault.rs"

[dependencies]
argon2 = "0.5"
chacha20poly1305 = "0.10"
rand = "0.8"
serde = { workspace = true }
serde_json = { workspace = true }
clap = { version = "4", features = ["derive"] }
rpassword = "7"
chrono = { version = "0.4", features = ["serde"] }
anyhow = { workspace = true }
thiserror = { workspace = true }
zeroize = { version = "1", features = ["zeroize_derive"] }
# `import` subcommand: curated-rule regex matcher against CLAUDE.md.
# Cross-platform crate, kept in main [dependencies].
regex = "1"

# Unix-only deps. Behind a target gate so the lib still compiles on
# Windows CI (the gateway transitively links this crate). nl_automation.rs
# guards the call site with cfg(unix); on Windows the openrouter fetch
# path bails cleanly with a "vault unavailable" error. The keyring crate
# is technically cross-platform but the `sync-secret-service` feature
# pulls in dbus-secret-service which only builds on unix; keyring_store
# itself is gated to cfg(unix) in lib.rs.
[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["process"] }
daemonize = "0.5"
# OS keychain: on hosts with gnome-keyring / kwallet / macOS keychain
# the passphrase can be stored there so `unlock` doesn't prompt after
# first use. Without an explicit backend feature keyring 3.x silently
# falls back to a no-op, which looks like success but never persists.
# Learned that the hard way on 2026-04-23.
keyring = { version = "3", features = ["sync-secret-service"] }
