[package]
name = "syntaur-verify"
version.workspace = true
edition.workspace = true
description = "Autonomous post-build visual + functional + security audit for the Syntaur gateway. Phase 1: scaffold + chromiumoxide harness + change→module impact map. Later phases layer Opus-driven auto-fix, persistent baselines, persona coverage, user-flow scripts, pipeline integration."

[lib]
name = "syntaur_verify_core"
path = "src/lib.rs"

[[bin]]
name = "syntaur-verify"
path = "src/bin/syntaur_verify.rs"

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_yaml = "0.9"
serde_json = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
anyhow = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
# CDP-based headless Chromium driver. More fidelity than
# fantoccini/WebDriver — we need console capture + network events +
# evaluate() for interaction walks. tokio-based.
chromiumoxide = { version = "0.9", default-features = false }
futures = "0.3"
# Topo manifest lookups so verify knows what URL to hit for each
# module (staging=Mac Mini, prod=TrueNAS) without hardcoded IPs.
syntaur-topo = { path = "../syntaur-topo" }
# Phase 2: Opus API via OpenRouter (chosen over direct Anthropic so
# we can reuse Sean's existing openrouter vault entry — no new
# credential to manage). Base64 screenshots embedded inline as
# data: URLs in OpenAI-compatible message shape.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
base64 = "0.22"
# Fetch the openrouter API key at runtime without reintroducing
# plaintext-in-code. syntaur-vault is path-dep'd as the agent
# client library.
syntaur-vault = { path = "../syntaur-vault" }
# Phase 3: persistent baselines + visual diff. Pure-Rust PNG
# decoder/encoder + resize + grayscale — no libpng dep. Default
# features disabled to keep the binary lean; we only need PNG.
image = { version = "0.25", default-features = false, features = ["png"] }
# Phase 4: `assert_url_matches` flow step. regex is already pulled in
# transitively by reqwest + chromiumoxide; listing it directly here so
# the flow module can use it without relying on a transitive lockfile.
regex = "1"

[dev-dependencies]
# Phase 2b fix.rs apply/revert tests run against a throwaway
# workspace tree — tempfile keeps them hermetic. Phase 3 reuses
# it for baseline + corpus round-trip tests.
tempfile = "3"
