name: Release — Sign Artifacts

# Phase 2.1 of the security plan. Every tag push builds release binaries,
# signs them with Sigstore cosign (keyless, OIDC identity from the
# Actions workflow itself — no long-lived signing keys to rotate), emits
# a `checksums.txt` + `*.cosign.bundle` alongside each binary, and
# publishes a SLSA v1.0 provenance attestation.
#
# Verify a downloaded artifact:
#
#   cosign verify-blob \
#     --bundle syntaur-gateway-linux-x86_64.cosign.bundle \
#     --certificate-identity "https://github.com/buddyholly007/syntaur/.github/workflows/release-sign.yml@refs/tags/vX.Y.Z" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     syntaur-gateway-linux-x86_64
#
#   sha256sum -c checksums.txt

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write       # upload release assets
  id-token: write       # OIDC token for cosign keyless
  attestations: write   # SLSA provenance

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }} / ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — gateway + viewer + isolation-tests
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: syntaur-gateway
            binary: syntaur-gateway
            artifact_name: syntaur-gateway-linux-x86_64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: syntaur-viewer
            binary: syntaur-viewer
            artifact_name: syntaur-viewer-linux-x86_64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: syntaur-isolation-tests
            binary: syntaur-isolation-tests
            artifact_name: syntaur-isolation-tests-linux-x86_64
          # macOS ARM (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            package: syntaur-gateway
            binary: syntaur-gateway
            artifact_name: syntaur-gateway-macos-arm64
          - os: macos-14
            target: aarch64-apple-darwin
            package: syntaur-viewer
            binary: syntaur-viewer
            artifact_name: syntaur-viewer-macos-arm64
          # macOS Intel — macos-13 runner queue is erratic (multi-hour
          # waits regularly stalled v0.4.0/v0.4.1/v0.4.2 release runs).
          # `continue-on-error` doesn't help while a job is stuck in
          # `queued` because GitHub waits for matrix entries to reach a
          # terminal state before evaluating the downstream
          # `sign-and-release` gate. So Intel Mac is OFF the tag-push
          # matrix entirely as of v0.4.3 — Intel users use Rosetta on
          # the arm64 binary (verified to run both gateway and viewer
          # correctly). Build Intel Mac artifacts on demand via the
          # workflow_dispatch path (`build-intel-mac` job below).
          # Windows x86_64 (MSVC ABI)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: syntaur-gateway
            binary: syntaur-gateway.exe
            artifact_name: syntaur-gateway-windows-x86_64.exe
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: syntaur-viewer
            binary: syntaur-viewer.exe
            artifact_name: syntaur-viewer-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    # Intel Mac targets don't block the release; all other platforms do.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ matrix.package }}

      - name: Install Linux build deps
        # syntaur-gateway transitively depends on libdbus-sys (via
        # syntaur-vault → keyring) which needs libdbus-1-dev + pkg-config
        # at build time. Prior to v0.5.0 this only surfaced as an apt
        # transitive of libwebkitgtk-6.0-dev, which we installed for the
        # viewer matrix entry only — the gateway entry got no deps and
        # panicked in the libdbus-sys build script on the Ubuntu runner.
        # Install libdbus-1-dev unconditionally on Linux; GUI deps remain
        # viewer-only so non-viewer builds stay fast.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
          if [ "${{ matrix.package }}" = "syntaur-viewer" ]; then
            sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
          fi

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.package }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact_name }}"

      # Smoke test: launch the freshly-built gateway, wait for /health,
      # kill it. Catches startup failures that compilation can't see
      # (missing VC++ runtime on Windows, missing dylib on macOS,
      # middleware regressions that wedge the handler chain). Scoped to
      # `syntaur-gateway` — viewer needs a display server, isolation-tests
      # needs a running gateway, neither smokes cleanly here.
      - name: Smoke test (non-Windows)
        if: runner.os != 'Windows' && matrix.package == 'syntaur-gateway'
        shell: bash
        run: |
          set -e
          ./dist/${{ matrix.artifact_name }} &
          PID=$!
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18789/health >/tmp/health.json 2>/dev/null; then
              echo "health:"; cat /tmp/health.json
              kill $PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "gateway failed to become healthy in 20s"
          kill $PID 2>/dev/null || true
          exit 1

      - name: Smoke test (Windows)
        if: runner.os == 'Windows' && matrix.package == 'syntaur-gateway'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist\${{ matrix.artifact_name }}" -PassThru -WindowStyle Hidden
          for ($i = 0; $i -lt 20; $i++) {
            try {
              $r = Invoke-WebRequest -Uri http://127.0.0.1:18789/health -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                Write-Host "health: $($r.Content)"
                Stop-Process -Id $p.Id -Force
                exit 0
              }
            } catch {}
            Start-Sleep -Seconds 1
          }
          Write-Host "gateway failed to become healthy in 20s"
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          exit 1

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 7

  # Opt-in Intel Mac builder. Only runs on workflow_dispatch — never
  # blocks tag-push releases. Run manually after a tag publishes if the
  # Intel Mac runner queue clears and you want to attach Intel binaries
  # to the existing release. Uploads to the same tag's release page.
  build-intel-mac:
    name: Build Intel Mac (workflow_dispatch only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-13
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        package:
          - syntaur-gateway
          - syntaur-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-intel-mac-${{ matrix.package }}
      - name: Build release
        run: cargo build --release --target x86_64-apple-darwin -p ${{ matrix.package }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-apple-darwin/release/${{ matrix.package }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true

  sign-and-release:
    name: Sign + publish release
    needs: build
    # Linux, Windows, and Mac arm64 are all required. Intel Mac is
    # built only via workflow_dispatch (see build-intel-mac above) and
    # is not part of `needs: build`, so the queue cannot stall this gate.
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage install scripts into dist
        # The landing page advertises
        # `https://github.com/buddyholly007/syntaur/releases/latest/download/install.sh`
        # — without copying install.sh + install.ps1 into the release
        # asset bundle, that URL 404s and the advertised install path is
        # broken. (Reviewer caught this 2026-04-30: site → 302 →
        # release/v0.6.5/install.sh → 404.) Staging here means the same
        # checksums + cosign + assertion pipeline below picks them up
        # automatically, so what users wget is the same content the
        # release was tagged with, and they can verify it before running.
        run: |
          set -euo pipefail
          cp install.sh   dist/install.sh
          cp install.ps1  dist/install.ps1
          chmod +x dist/install.sh
          ls -la dist/install.sh dist/install.ps1

      - name: List dist
        run: ls -la dist/

      - name: Assert core platforms present
        working-directory: dist
        run: |
          # Intel Mac is optional (runner shortage). Everything else is
          # mandatory — refuse to publish a partial release that's missing
          # Linux, Windows, or Apple Silicon Mac. Install scripts are
          # mandatory so the homepage's wget/curl install path is never
          # 404. Their absence indicates a workflow regression upstream
          # (e.g. someone removed the Stage step) and the release should
          # not publish.
          required=(
            syntaur-gateway-linux-x86_64
            syntaur-viewer-linux-x86_64
            syntaur-isolation-tests-linux-x86_64
            syntaur-gateway-macos-arm64
            syntaur-viewer-macos-arm64
            syntaur-gateway-windows-x86_64.exe
            syntaur-viewer-windows-x86_64.exe
            install.sh
            install.ps1
          )
          missing=()
          for f in "${required[@]}"; do
            [ -f "$f" ] || missing+=("$f")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required release artifacts: ${missing[*]}"
            exit 1
          fi
          echo "All core artifacts present ($(ls syntaur-* install.sh install.ps1 | wc -l) total)."

      - name: Compute checksums
        working-directory: dist
        run: |
          # Hash every shipped binary, not just the gateway. Matrix builds
          # viewer + isolation-tests alongside the gateway (all
          # `syntaur-*`-prefixed); each must enter the checksum + sign +
          # provenance pipeline so the published release is actually fully
          # verifiable. Install scripts are also hashed so a user who
          # wgets install.sh can sha256sum-c against checksums.txt
          # before running it.
          sha256sum syntaur-* install.sh install.ps1 > checksums.txt
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign each artifact
        working-directory: dist
        run: |
          # Sign every shipped artifact AND the install scripts. The
          # install scripts are the FIRST thing a user runs, so they
          # need to be cosign-verifiable too — a tampered install.sh
          # would let an attacker subvert checksum verification before
          # any binary is touched. Closing that hole is the most
          # security-relevant part of this signing pass.
          for f in syntaur-* install.sh install.ps1; do
            # Skip the cosign bundles + checksum file themselves (signed below).
            case "$f" in
              *.cosign.bundle|checksums.txt) continue ;;
            esac
            cosign sign-blob \
              --yes \
              --bundle "${f}.cosign.bundle" \
              "${f}"
          done
          cosign sign-blob \
            --yes \
            --bundle checksums.txt.cosign.bundle \
            checksums.txt

      - name: Attest SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          # Provenance covers binaries AND install scripts so a user
          # verifying install.sh can confirm it was built by THIS
          # workflow on THIS tag, not patched in transit or pushed by
          # an attacker who swapped the asset post-publish.
          subject-path: |
            dist/syntaur-*
            dist/install.sh
            dist/install.ps1

      # Replaces softprops/action-gh-release@v2 — that action flaked on
      # v0.6.2 and v0.6.4 with intermittent "Upload release assets" failures
      # that left the release entity uncreated, so prod deployed but the
      # public GitHub Release page lagged behind. Direct gh CLI with
      # explicit retry + post-upload asset-count assertion gives us a
      # workflow that EITHER publishes a complete release OR fails the
      # workflow loud and clear with no half-published state.
      - name: Create release + upload assets (with retry + verification)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Dedupe the asset list. The naive `( syntaur-* checksums.txt
          # *.cosign.bundle )` literal counts every cosign bundle twice
          # because `syntaur-*` already matches `syntaur-…cosign.bundle`
          # siblings. That inflated `expected` from 16 to 23 on v0.6.5,
          # so the post-upload assertion (`actual < expected`) failed
          # despite the release being correctly published with all 16
          # files. `sort -u` collapses the overlap.
          mapfile -t assets < <(printf '%s\n' syntaur-* checksums.txt install.sh install.ps1 *.cosign.bundle | sort -u)
          expected=${#assets[@]}
          if (( expected == 0 )); then
            echo "::error::no assets found in dist/ — refusing to publish empty release"
            exit 1
          fi
          echo "preparing to publish ${expected} assets for ${TAG}:"
          printf '  %s\n' "${assets[@]}"

          cat > /tmp/release-body.md <<EOF
          ## Verified release

          Every binary is signed with Sigstore cosign (keyless OIDC) and
          accompanied by \`.cosign.bundle\`. Verify before running:

          \`\`\`bash
          # SHA-256 verification (fast)
          sha256sum -c checksums.txt

          # Cosign signature verification (authoritative)
          cosign verify-blob \\
            --bundle syntaur-gateway-linux-x86_64.cosign.bundle \\
            --certificate-identity "https://github.com/buddyholly007/syntaur/.github/workflows/release-sign.yml@refs/tags/${TAG}" \\
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \\
            syntaur-gateway-linux-x86_64
          \`\`\`

          See \`SECURITY.md\` for the rolling disclosure policy.
          EOF

          # Create the release if it doesn't exist; tolerate idempotent retries.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "release ${TAG} already exists; will upload to it"
          else
            for attempt in 1 2 3; do
              if gh release create "${TAG}" \
                  --title "${TAG}" \
                  --notes-file /tmp/release-body.md \
                  --verify-tag; then
                echo "release ${TAG} created (attempt ${attempt})"
                break
              fi
              if (( attempt == 3 )); then
                echo "::error::failed to create release ${TAG} after 3 attempts"
                exit 1
              fi
              sleep $(( attempt * 5 ))
            done
          fi

          # Upload each asset with retry. --clobber tolerates re-uploads
          # so a partial-success retry doesn't dupe-collide.
          for asset in "${assets[@]}"; do
            if [ ! -f "${asset}" ]; then
              echo "::error::expected asset ${asset} not present in dist/"
              exit 1
            fi
            uploaded=0
            for attempt in 1 2 3 4 5; do
              if gh release upload "${TAG}" "${asset}" --clobber; then
                echo "  ✓ uploaded ${asset} (attempt ${attempt})"
                uploaded=1
                break
              fi
              echo "  ✗ upload ${asset} attempt ${attempt} failed; backing off"
              sleep $(( attempt * 10 ))
            done
            if (( uploaded == 0 )); then
              echo "::error::failed to upload ${asset} after 5 attempts"
              exit 1
            fi
          done

          # Post-upload assertion — refuse to declare success if the release
          # is missing any expected asset.
          actual=$(gh release view "${TAG}" --json assets --jq '.assets | length')
          if (( actual < expected )); then
            echo "::error::release ${TAG} has only ${actual}/${expected} assets after upload — pipeline must not declare success"
            gh release view "${TAG}" --json assets --jq '.assets[].name' | sed 's/^/  present: /'
            exit 1
          fi
          echo "✓ release ${TAG} published with ${actual} assets"
