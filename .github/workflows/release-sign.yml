name: Release — Sign Artifacts

# Phase 2.1 of the security plan. Every tag push builds release binaries,
# signs them with Sigstore cosign (keyless, OIDC identity from the
# Actions workflow itself — no long-lived signing keys to rotate), emits
# a `checksums.txt` + `*.cosign.bundle` alongside each binary, and
# publishes a SLSA v1.0 provenance attestation.
#
# Verify a downloaded artifact:
#
#   cosign verify-blob \
#     --bundle syntaur-gateway-linux-x86_64.cosign.bundle \
#     --certificate-identity "https://github.com/buddyholly007/syntaur/.github/workflows/release-sign.yml@refs/tags/vX.Y.Z" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     syntaur-gateway-linux-x86_64
#
#   sha256sum -c checksums.txt

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write       # upload release assets
  id-token: write       # OIDC token for cosign keyless
  attestations: write   # SLSA provenance

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }} / ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — gateway + viewer + isolation-tests
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: syntaur-gateway
            binary: syntaur-gateway
            artifact_name: syntaur-gateway-linux-x86_64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: syntaur-viewer
            binary: syntaur-viewer
            artifact_name: syntaur-viewer-linux-x86_64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            package: syntaur-isolation-tests
            binary: syntaur-isolation-tests
            artifact_name: syntaur-isolation-tests-linux-x86_64
          # macOS ARM (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
            package: syntaur-gateway
            binary: syntaur-gateway
            artifact_name: syntaur-gateway-macos-arm64
          - os: macos-14
            target: aarch64-apple-darwin
            package: syntaur-viewer
            binary: syntaur-viewer
            artifact_name: syntaur-viewer-macos-arm64
          # macOS Intel — macos-13 runners still have x86_64; macos-14+ are ARM-only
          - os: macos-13
            target: x86_64-apple-darwin
            package: syntaur-gateway
            binary: syntaur-gateway
            artifact_name: syntaur-gateway-macos-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            package: syntaur-viewer
            binary: syntaur-viewer
            artifact_name: syntaur-viewer-macos-x86_64
          # Windows x86_64 (MSVC ABI)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: syntaur-gateway
            binary: syntaur-gateway.exe
            artifact_name: syntaur-gateway-windows-x86_64.exe
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: syntaur-viewer
            binary: syntaur-viewer.exe
            artifact_name: syntaur-viewer-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ matrix.package }}

      - name: Install Linux GUI deps (syntaur-viewer only)
        if: runner.os == 'Linux' && matrix.package == 'syntaur-viewer'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.package }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact_name }}"

      - name: Upload built binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 7

  sign-and-release:
    name: Sign + publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List dist
        run: ls -la dist/

      - name: Compute checksums
        working-directory: dist
        run: |
          # Hash every shipped binary, not just the gateway. Matrix builds
          # viewer + isolation-tests alongside the gateway (all
          # `syntaur-*`-prefixed); each must enter the checksum + sign +
          # provenance pipeline so the published release is actually fully
          # verifiable.
          sha256sum syntaur-* > checksums.txt
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign each artifact
        working-directory: dist
        run: |
          for f in syntaur-*; do
            # Skip the cosign bundles + checksum file themselves (signed below).
            case "$f" in
              *.cosign.bundle|checksums.txt) continue ;;
            esac
            cosign sign-blob \
              --yes \
              --bundle "${f}.cosign.bundle" \
              "${f}"
          done
          cosign sign-blob \
            --yes \
            --bundle checksums.txt.cosign.bundle \
            checksums.txt

      - name: Attest SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/syntaur-*'

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/syntaur-*
            dist/checksums.txt
            dist/*.cosign.bundle
          body: |
            ## Verified release

            Every binary is signed with Sigstore cosign (keyless OIDC) and
            accompanied by `.cosign.bundle`. Verify before running:

            ```bash
            # SHA-256 verification (fast)
            sha256sum -c checksums.txt

            # Cosign signature verification (authoritative)
            cosign verify-blob \
              --bundle syntaur-gateway-linux-x86_64.cosign.bundle \
              --certificate-identity "https://github.com/buddyholly007/syntaur/.github/workflows/release-sign.yml@${{ github.ref }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              syntaur-gateway-linux-x86_64
            ```

            See `SECURITY.md` for the rolling disclosure policy.
