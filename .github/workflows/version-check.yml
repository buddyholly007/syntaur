name: Version consistency check

# Phase 2.5 of the security plan. Fails the build if the version strings
# in `install.sh`, the website landing page, and the README disagree with
# the workspace `Cargo.toml` version. Prevents the "user installs 0.1.2
# thinking it's 0.2.0" distribution-trust class of bug.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  version-check:
    name: Versions match
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Extract canonical version (VERSION file is source of truth)
        id: canon
        run: |
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file missing at repo root. It is the authoritative source."
            exit 1
          fi
          VERSION=$(tr -d '[:space:]' < VERSION)
          if [ -z "$VERSION" ]; then
            echo "::error::VERSION file is empty"
            exit 1
          fi
          echo "Canonical version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check workspace Cargo.toml
        run: |
          V="${{ steps.canon.outputs.version }}"
          if ! grep -qE "^version = \"$V\"" Cargo.toml; then
            echo "::error file=Cargo.toml::[workspace.package] version mismatch (want $V). Run scripts/sync-version.sh"
            grep -nE "^version = " Cargo.toml | head -5
            exit 1
          fi

      - name: Check install.sh
        run: |
          V="${{ steps.canon.outputs.version }}"
          if ! grep -qE "^VERSION=\"$V\"" install.sh; then
            echo "::error file=install.sh::VERSION mismatch (want $V). Run scripts/sync-version.sh"
            grep -nE "^VERSION=" install.sh | head -3
            exit 1
          fi

      - name: Check install.ps1
        run: |
          V="${{ steps.canon.outputs.version }}"
          if ! grep -qE "^\\\$Version = \"$V\"" install.ps1; then
            echo "::error file=install.ps1::\$Version mismatch (want $V). Run scripts/sync-version.sh"
            grep -nE "^\\\$Version = " install.ps1 | head -3
            exit 1
          fi

      - name: Check landing page version badge
        run: |
          V="${{ steps.canon.outputs.version }}"
          if [ -f landing/index.html ]; then
            if ! grep -qE "<!-- VERSION-BADGE -->v$V<!-- /VERSION-BADGE -->" landing/index.html; then
              echo "::error file=landing/index.html::VERSION-BADGE mismatch (want v$V). Run scripts/sync-version.sh"
              grep -nE "VERSION-BADGE" landing/index.html | head -3
              exit 1
            fi
          fi

      - name: Summary
        run: |
          echo "All version strings match: ${{ steps.canon.outputs.version }}"
          echo "  - VERSION file ✓"
          echo "  - Cargo.toml [workspace.package] ✓"
          echo "  - install.sh ✓"
          echo "  - install.ps1 ✓"
          echo "  - landing/index.html VERSION-BADGE ✓"
