name: Build Syntaur

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: syntaur-linux-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: syntaur-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: syntaur-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: syntaur-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build gateway
        run: cargo build --release --target ${{ matrix.target }} -p rust-syntaur
        env:
          OPENSSL_STATIC: "1"

      - name: Build module manager
        run: cargo build --release --target ${{ matrix.target }} -p syntaur-mod

      - name: Rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/rust-syntaur.exe dist/${{ matrix.artifact }}
            cp target/${{ matrix.target }}/release/ocmod.exe dist/ocmod-windows-x86_64.exe
          else
            cp target/${{ matrix.target }}/release/rust-syntaur dist/${{ matrix.artifact }}
            SUFFIX="${{ matrix.artifact }}"
            SUFFIX="${SUFFIX#syntaur-}"
            cp target/${{ matrix.target }}/release/ocmod dist/ocmod-${SUFFIX}
            chmod +x dist/*
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
