name: Build Syntaur

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: syntaur-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: syntaur-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: syntaur-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        # Linux viewer uses gtk4 + webkit6 (see syntaur-viewer/src/main.rs).
        # Also keep the older gtk3 / webkit2gtk-4.1 available in case any
        # other crate in the workspace still pulls them.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build gateway
        run: cargo build --release --target ${{ matrix.target }} -p syntaur-gateway
        env:
          OPENSSL_STATIC: "1"

      - name: Build module manager
        run: cargo build --release --target ${{ matrix.target }} -p syntaur-mod

      # Viewer is nice-to-have; don't block the gateway release when it fails
      # to build. The rename step below tolerates a missing viewer binary.
      - name: Build viewer
        continue-on-error: true
        run: cargo build --release --target ${{ matrix.target }} -p syntaur-viewer

      - name: Rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/syntaur-gateway.exe dist/${{ matrix.artifact }}
            cp target/${{ matrix.target }}/release/syntaur-mod.exe dist/syntaur-mod-windows-x86_64.exe
            if [[ -f target/${{ matrix.target }}/release/syntaur-viewer.exe ]]; then
              cp target/${{ matrix.target }}/release/syntaur-viewer.exe dist/syntaur-viewer-windows-x86_64.exe
            else
              echo "viewer binary missing (viewer build failed or was skipped) -- releasing without it"
            fi
          else
            cp target/${{ matrix.target }}/release/syntaur-gateway dist/${{ matrix.artifact }}
            SUFFIX="${{ matrix.artifact }}"
            SUFFIX="${SUFFIX#syntaur-}"
            cp target/${{ matrix.target }}/release/syntaur-mod dist/syntaur-mod-${SUFFIX}
            if [[ -f target/${{ matrix.target }}/release/syntaur-viewer ]]; then
              cp target/${{ matrix.target }}/release/syntaur-viewer dist/syntaur-viewer-${SUFFIX}
            else
              echo "viewer binary missing (viewer build failed or was skipped) -- releasing without it"
            fi
            chmod +x dist/*
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
