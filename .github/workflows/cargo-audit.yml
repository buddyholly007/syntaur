name: Cargo Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every morning at 07:00 UTC — catch newly published advisories fast
    - cron: '0 7 * * *'

permissions:
  contents: read
  issues: write  # allow cargo-audit to open issues on new advisories

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
